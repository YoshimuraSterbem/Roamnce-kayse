<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasons • wave to earth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            background: linear-gradient(180deg, #0f0f1e, #1a1a2e);
            color: #f800f870;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(204, 0, 255, 0.06) 0%, transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(0, 128, 255, 0.05) 0%, transparent 60%);
            animation: subtlePulse 18s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes subtlePulse {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.05); }
        }

        .player {
            background: rgba(0, 0, 0, 0.92);
            border-radius: 24px;
            padding: 28px 24px;
            width: 360px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6),
                        inset 0 0 30px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(225, 0, 255, 0.15);
            transition: all 0.6s ease;
        }
        .player.playing {
            box-shadow: 0 25px 80px rgba(85, 0, 255, 0.45),
                        0 0 60px rgba(255, 0, 106, 0.3);
            transform: translateY(-4px);
        }

        .album-art-container {
            position: relative;
            margin: 0 auto 20px;
            width: 220px;
            height: 220px;
        }
        .album-art {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 12px 50px rgba(0,0,0,0.7),
                        0 0 40px rgba(204, 0, 255, 0.25);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .album-art.playing {
            animation: vinylSpin 28s linear infinite;
            filter: brightness(1.1) contrast(1.05);
        }
        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .visualizer {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 15px 0 25px;
            filter: drop-shadow(0 0 15px rgba(255, 0, 128, 0.6));
        }
        .bar {
            width: 5px;
            background: linear-gradient(to top, #ec8aff, #5c0080);
            border-radius: 999px;
            animation: pulseBar 1.2s infinite ease-in-out alternate;
            transform-origin: bottom;
        }
        @keyframes pulseBar {
            0%   { height: 20%; transform: scaleY(0.4); }
            100% { height: 100%; transform: scaleY(1.2); }
        }
        .bar:nth-child(odd)  { animation-duration: 0.9s; animation-delay: 0.1s; }
        .bar:nth-child(even) { animation-duration: 1.1s; animation-delay: 0.3s; }
        .visualizer.paused .bar { animation-play-state: paused; height: 30% !important; }

        .song-title { font-size: 24px; font-weight: 600; margin: 10px 0 4px; }
        .song-artist { font-size: 16px; color: #aaa; }

        .progress-container { display: flex; align-items: center; margin: 18px 0; }
        .time { font-size: 14px; color: #fc6363; width: 50px; text-align: center; }
        .progress {
            flex: 1;
            height: 7px;
            background: #000000;
            border-radius: 999px;
            outline: none;
            margin: 0 12px;
        }
        .progress::-webkit-slider-thumb {
            width: 16px;
            height: 16px;
            background: #d400ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #cc00ff;
            cursor: pointer;
        }

        .main-controls {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        .main-controls i {
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .main-controls i:hover { transform: scale(1.2) rotate(5deg); color: #cc00ff; }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .volume-icon { font-size: 22px; color: #aaa; }
        .volume-slider {
            width: 140px;
            height: 6px;
            background: #222;
            border-radius: 999px;
        }
        .volume-slider::-webkit-slider-thumb {
            width: 14px;
            height: 14px;
            background: #d400ff;
            border-radius: 50%;
            box-shadow: 0 0 12px #c300ff;
        }
    </style>
</head>
<body>
    <div class="player" id="player-main">
        <div class="album-art-container">
            <img src="https://i.pinimg.com/originals/1a/4b/53/1a4b53f2bf81aaa679f58d2ed0b1d7cf.jpg" 
                 id="album-art" class="album-art" alt="seasons - wave to earth">
        </div>

        <div class="visualizer" id="visualizer">
            <!-- Barras criadas via JS -->
        </div>

        <h2 class="song-title">S E A S O N S</h2>
        <p class="song-artist">Wave to Earth</p>

        <div class="progress-container">
            <span class="time" id="current-time">00:00</span>
            <input type="range" class="progress" id="progress-bar" min="0" max="100" value="0">
            <span class="time" id="total-time">04:16</span>
        </div>

        <div class="main-controls">
            <i class="fas fa-step-backward" onclick="seekBackward()"></i>
            <i class="fas fa-play" id="play-pause" onclick="togglePlay()"></i>
            <i class="fas fa-step-forward" onclick="seekForward()"></i>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-up" id="volume-icon"></i>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="70">
        </div>
    </div>

    <!-- Elemento de áudio -->
    <audio id="audio-player" preload="metadata">
        <source src="seasons.mp3" type="audio/mpeg">
        
    </audio>

    <script>
        const audio = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeIcon = document.getElementById('volume-icon');
        const albumArt = document.getElementById('album-art');
        const playerMain = document.getElementById('player-main');
        const visualizer = document.getElementById('visualizer');

        let duration = 0;

        // Atualiza duração quando o áudio carrega metadados
        audio.addEventListener('loadedmetadata', () => {
            duration = audio.duration;
            totalTimeEl.textContent = formatTime(duration);
            createVisualizer();
        });

        // Atualiza progresso e tempo atual
        audio.addEventListener('timeupdate', () => {
            if (!duration) return;
            const progress = (audio.currentTime / duration) * 100;
            progressBar.value = progress;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        // Controle de play/pause
        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(err => console.log("Erro ao tocar:", err));
                playPauseBtn.classList.remove('fa-play');
                playPauseBtn.classList.add('fa-pause');
                playerMain.classList.add('playing');
                albumArt.classList.add('playing');
                visualizer.classList.remove('paused');
            } else {
                audio.pause();
                playPauseBtn.classList.remove('fa-pause');
                playPauseBtn.classList.add('fa-play');
                playerMain.classList.remove('playing');
                albumArt.classList.remove('playing');
                visualizer.classList.add('paused');
            }
        }

        // Barra de progresso
        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * duration;
            audio.currentTime = seekTime;
        });

        // Volume
        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value / 100;
            updateVolumeIcon(audio.volume * 100);
        });

        function updateVolumeIcon(vol) {
            volumeIcon.className = 'fas';
            if (vol === 0) volumeIcon.classList.add('fa-volume-mute');
            else if (vol < 35) volumeIcon.classList.add('fa-volume-off');
            else if (vol < 70) volumeIcon.classList.add('fa-volume-down');
            else volumeIcon.classList.add('fa-volume-up');
        }

        // Seek ±10s
        function seekBackward() { audio.currentTime = Math.max(0, audio.currentTime - 10); }
        function seekForward() { audio.currentTime = Math.min(duration, audio.currentTime + 10); }

        // Formatação de tempo MM:SS
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Visualizador de barras
        function createVisualizer() {
            visualizer.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.animationDelay = `${Math.random() * 0.6}s`;
                bar.style.animationDuration = `${0.8 + Math.random() * 0.8}s`;
                visualizer.appendChild(bar);
            }
        }

        // Inicia com volume em 70%
        audio.volume = 0.7;
        updateVolumeIcon(70);
    </script>
</body>
</html>
